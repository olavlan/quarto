name: Create themes and screenshots
on:
  push:
    paths:
      - quarto.tera
      - _quarto.yml
      - index.qmd

permissions: write-all

jobs:
  create-themes-and-screenshots:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup Whiskers
      uses: catppuccin/setup-whiskers@v2
    - name: Run Whiskers
      run: |
        whiskers quarto.tera
    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install playwright jinja2
    - name: Ensure browser is installed
      run: python -m playwright install --with-deps chromium
    - name: Run scheenshot script
      run: python screenshot.py
    - name: Setup Catwalk
      uses: catppuccin/setup-catwalk@v1.0.0
    - name: Run Catwalk
      run: |
        catwalk latte.png frappe.png macchiato.png mocha.png --directory ./assets/
    - name: Update README Image urls with Cache-Buster
      run: |
        sed -i "s|raw\.githubusercontent\.com/[^/]*/[^/]*/[^/]*/assets/\(preview\.webp\|latte\.png\|macchiato\.png\|frappe\.png\|mocha\.png\)\(\?v=[^\"]*\)\?|raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.ref_name }}/assets/\1?v=${{ github.run_id }}|g" README.md
    - name: Commit and push themes and previews
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add assets/* themes/*
        git commit -m "update themes and previews"
        git push