name: Create themes and screenshots
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions: write-all

jobs:
  create-themes-and-screenshots:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup Whiskers
      uses: catppuccin/setup-whiskers@v2
    - name: Run Whiskers
      run: |
        whiskers quarto.tera
    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install playwright jinja2
    - name: Ensure browser is installed
      run: python -m playwright install --with-deps chromium
    - name: Run scheenshot script
      run: python screenshot.py
    - name: Commit and push screenshot
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add assets/* themes/*
        git commit -m "update themes and previews"
        git push